<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Пульс</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Pulse-HCM design system (v1.8.0): SB Sans Text/Display preferred (installed
       on Sber dev machines), Onest as public fallback from Google Fonts so the
       look matches off-corp. JetBrains Mono kept for tabular numerals only. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root {
      color-scheme: light dark;

      /* ─── Pulse-HCM canonical tokens ──────────────────────────── */
      --p-bg:           #ffffff;
      --p-surface:      #f7f8fa;
      --p-tint:         #f0f6ff;
      --p-tint-2:       #ecf3ff;
      --p-tint-3:       #d0e3ff;
      --p-border:       #e3e7ec;
      --p-border-soft:  #ecf0f4;
      --p-fg:           #252525;
      --p-fg-muted:     #5c5c5c;
      --p-fg-soft:      #939393;
      --p-fg-faint:     #b3b5b7;
      --p-accent:       #0066ff;
      --p-accent-deep:  #0044bb;
      --p-accent-soft:  #1a75ff;
      --p-purple:       #a729ff;
      --p-good:         #2a8a3f;
      --p-bad:          #c92140;
      --p-grad-hero:    linear-gradient(140deg, #a729ff 0%, #0763ff 42%, #0066ff 100%);

      --p-font-display: 'SB Sans Display', 'Onest', system-ui, -apple-system, sans-serif;
      --p-font-body:    'SB Sans Text', 'Onest', system-ui, -apple-system, sans-serif;
      --p-font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;

      --p-r-sm: 8px;  --p-r: 12px;  --p-r-lg: 20px;  --p-r-xl: 32px;
      --p-shadow-sm: 0 1px 0 rgba(0,0,0,0.04);
      --p-shadow:    0 2px 10px rgba(0,0,0,0.07);

      /* ─── Legacy aliases — keep existing CSS rules working ─── */
      --bg:           var(--p-surface);
      --fg:           var(--p-fg);
      --bubble-user:  var(--p-tint);
      --bubble-pulse: var(--p-bg);
      --border:       var(--p-border);
      --accent:       var(--p-accent);
      --muted:        var(--p-fg-muted);

      --ed-paper:        var(--p-bg);
      --ed-paper-dim:    var(--p-surface);
      --ed-paper-edge:   var(--p-tint-2);
      --ed-ink:          var(--p-fg);
      --ed-ink-soft:     var(--p-fg-muted);
      --ed-rule:         var(--p-border);
      --ed-oxblood:      var(--p-accent);
      --ed-oxblood-fade: var(--p-accent-soft);
      --ed-mark:         var(--p-tint-3);

      --ed-display: var(--p-font-display);
      --ed-body:    var(--p-font-body);
      --ed-mono:    var(--p-font-mono);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --p-bg:          #0e1117;
        --p-surface:     #161a22;
        --p-tint:        #131c2e;
        --p-tint-2:      #0f1827;
        --p-tint-3:      #1b2738;
        --p-border:      #232a36;
        --p-border-soft: #1c222c;
        --p-fg:          #e8edf5;
        --p-fg-muted:    #98a2b3;
        --p-fg-soft:     #6b758a;
        --p-fg-faint:    #515b6e;
        --p-accent:      #3385ff;
        --p-accent-deep: #5297ff;
        --p-accent-soft: #1a75ff;
        --p-purple:      #c46bff;
        --p-good:        #59c172;
        --p-bad:         #ff5772;
        --p-shadow:      0 2px 10px rgba(0,0,0,0.45);
      }
    }
    body { font-family: var(--p-font-body); -webkit-font-smoothing: antialiased;
           text-rendering: optimizeLegibility;
           background: var(--bg); color: var(--fg); margin: 0; }
    main { max-width: 820px; margin: 0 auto; padding: 1rem 1rem 8rem; }
    h1 {
      display: flex; align-items: baseline; gap: 0.7rem; flex-wrap: wrap;
      font-family: var(--p-font-display);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    h1 small {
      font-size: 0.74rem; color: var(--p-fg-soft); font-weight: 500;
      font-family: var(--p-font-mono); letter-spacing: 0.04em;
    }
    .nav-link {
      margin-left: auto;
      font-family: var(--p-font-body);
      font-weight: 500;
      font-size: 0.88rem;
      color: var(--p-accent);
      letter-spacing: 0;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--p-border);
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .nav-link:hover { background: var(--p-tint); border-color: var(--p-accent); }
    .msg { padding: 0.9rem 1.1rem; border-radius: var(--p-r-lg); margin: 0.55rem 0;
           border: 1px solid var(--p-border-soft); white-space: pre-wrap;
           line-height: 1.55; box-shadow: var(--p-shadow-sm); }
    .msg.user  { background: var(--p-tint);   border-color: var(--p-tint-3); }
    .msg.pulse { background: var(--p-bg);     border-color: var(--p-border-soft); }
    /* Markdown-rendered assistant bubbles: HTML controls whitespace, so the
       parent's pre-wrap would inject spurious blank lines around block tags. */
    .msg.pulse.md { white-space: normal; }
    .msg.pulse.md > :first-child { margin-top: 0; }
    .msg.pulse.md > :last-child  { margin-bottom: 0; }
    .msg.pulse.md h1, .msg.pulse.md h2, .msg.pulse.md h3,
    .msg.pulse.md h4, .msg.pulse.md h5, .msg.pulse.md h6 {
      margin: 0.9rem 0 0.4rem; line-height: 1.25; font-weight: 600;
    }
    .msg.pulse.md h1 { font-size: 1.35rem; }
    .msg.pulse.md h2 { font-size: 1.2rem; }
    .msg.pulse.md h3 { font-size: 1.05rem; }
    .msg.pulse.md h4, .msg.pulse.md h5, .msg.pulse.md h6 { font-size: 1rem; }
    .msg.pulse.md p  { margin: 0.4rem 0; }
    .msg.pulse.md ul, .msg.pulse.md ol { margin: 0.4rem 0; padding-left: 1.4rem; }
    .msg.pulse.md li { margin: 0.15rem 0; }
    .msg.pulse.md li > p { margin: 0.15rem 0; }
    .msg.pulse.md blockquote {
      margin: 0.5rem 0; padding: 0.2rem 0.8rem;
      border-left: 3px solid var(--border); color: var(--muted);
    }
    .msg.pulse.md a { color: var(--accent); text-decoration: underline; }
    .msg.pulse.md hr { border: none; border-top: 1px solid var(--border); margin: 0.8rem 0; }
    .msg.pulse.md code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.88em; background: rgba(127,127,127,0.15);
      padding: 0.05rem 0.3rem; border-radius: 4px;
    }
    .msg.pulse.md pre {
      background: rgba(127,127,127,0.12); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.6rem 0.8rem; overflow-x: auto;
      margin: 0.5rem 0;
    }
    .msg.pulse.md pre code { background: transparent; padding: 0; border-radius: 0; }
    .msg.pulse.md table {
      border-collapse: collapse; margin: 0.5rem 0;
      font-size: 0.92rem; max-width: 100%; display: block; overflow-x: auto;
    }
    .msg.pulse.md th, .msg.pulse.md td {
      border: 1px solid var(--border); padding: 0.35rem 0.6rem;
      text-align: left; vertical-align: top;
    }
    .msg.pulse.md th { background: rgba(127,127,127,0.12); font-weight: 600; }
    .msg.pulse.md tr:nth-child(even) td { background: rgba(127,127,127,0.05); }
    .msg.pulse.md strong { font-weight: 600; }
    .msg.pulse.md em { font-style: italic; }
    .meta { font-size: 0.78rem; color: var(--p-fg-muted); display: flex;
            gap: 0.55rem; align-items: center; margin-top: 0.5rem;
            font-family: var(--p-font-mono); letter-spacing: 0.02em; }
    .meta button { font-size: 0.95rem; cursor: pointer; background: var(--p-bg);
                   border: 1px solid var(--p-border); border-radius: var(--p-r-sm);
                   padding: 0.18rem 0.6rem; color: var(--p-fg);
                   transition: border-color 0.15s ease, background 0.15s ease; }
    .meta button:hover { border-color: var(--p-accent); background: var(--p-tint); }
    .meta button.active { border-color: var(--p-accent); background: var(--p-tint); color: var(--p-accent); }
    .meta input { flex: 1; padding: 0.35rem 0.6rem; border: 1px solid var(--p-border);
                  border-radius: var(--p-r-sm); background: var(--p-bg); color: var(--p-fg);
                  font: inherit; font-family: var(--p-font-body); }
    .meta input:focus { outline: none; border-color: var(--p-accent);
                         box-shadow: 0 0 0 3px rgba(0,102,255,0.10); }
    form#composer { position: fixed; left: 0; right: 0; bottom: 0;
                     padding: 0.85rem; background: var(--p-bg);
                     border-top: 1px solid var(--p-border-soft);
                     box-shadow: 0 -2px 12px rgba(0,0,0,0.04); }
    form#composer .row { max-width: 820px; margin: 0 auto;
                          display: flex; gap: 0.55rem; }
    textarea { flex: 1; padding: 0.7rem 0.85rem; border: 1px solid var(--p-border);
               border-radius: var(--p-r); background: var(--p-bg); color: var(--p-fg);
               resize: none; min-height: 2.6rem; font: inherit;
               transition: border-color 0.15s ease, box-shadow 0.15s ease; }
    textarea:focus { outline: none; border-color: var(--p-accent);
                     box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.12); }
    button.primary { background: var(--p-accent); border: none; color: white;
                     padding: 0 1.3rem; border-radius: var(--p-r); cursor: pointer;
                     font-weight: 500; font-size: 1.1rem;
                     transition: background 0.15s ease, transform 0.1s ease; }
    button.primary:hover { background: var(--p-accent-deep); }
    button.primary:active { transform: translateY(1px); }
    button.primary[disabled] { opacity: 0.5; cursor: not-allowed; }
    .toast { position: fixed; right: 1rem; bottom: 5rem; background: #333;
             color: #fff; padding: 0.5rem 0.9rem; border-radius: 8px;
             font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .activity { font-size: 0.85rem; color: var(--muted); display: flex;
                flex-direction: column; gap: 0.2rem; }
    .activity .step { display: flex; gap: 0.4rem; align-items: baseline;
                       opacity: 0; animation: fadeIn 0.2s ease forwards; }
    .activity .step .arg { font-family: ui-monospace, monospace;
                            font-size: 0.78rem; opacity: 0.8; }
    .activity .pulsing::after { content: '…'; animation: blink 1.2s infinite; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes blink  { 50% { opacity: 0.3; } }
    details.trace { margin-top: 0.5rem; font-size: 0.78rem; color: var(--muted); }
    details.trace summary { cursor: pointer; user-select: none; }
    details.trace .activity { margin-top: 0.3rem; }

    /* ===========================================================
       Заметка редактору — editorial-aesthetic feedback widget
       (since v1.6.0). Floating button → modal dialog styled like
       a personal letter to the editor of a daily brief. Uses only
       the --ed-* design tokens so the rest of the chat UI is
       unchanged until v1.7.0 redesigns it wholesale.
       =========================================================== */
    .editor-note-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 90;
      background: var(--p-bg);
      border: 1px solid var(--p-border);
      color: var(--p-fg);
      padding: 0.55rem 1rem;
      font-family: var(--p-font-body);
      font-size: 0.86rem;
      font-weight: 500;
      letter-spacing: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      border-radius: 999px;
      box-shadow: var(--p-shadow-sm);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .editor-note-btn:hover {
      transform: translateY(-1px);
      box-shadow: var(--p-shadow);
      border-color: var(--p-accent);
      color: var(--p-accent);
    }
    .editor-note-btn:active {
      transform: translateY(0);
      box-shadow: var(--p-shadow-sm);
    }
    .editor-note-btn .seal {
      width: 0.55rem; height: 0.55rem;
      border-radius: 50%;
      background: var(--p-grad-hero);
      box-shadow: 0 0 0 3px rgba(167, 41, 255, 0.12);
      font-size: 0; /* hide ✦ glyph */
    }
    .editor-note-btn .note-label {
      text-align: left;
      line-height: 1.1;
      letter-spacing: 0;
    }
    .editor-note-btn .note-label small {
      font-family: var(--p-font-mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--p-fg-soft);
      display: block;
      margin-top: 0.15rem;
    }

    .editor-note-dialog {
      border: 1px solid var(--p-border-soft);
      background: var(--p-bg);
      color: var(--p-fg);
      padding: 0;
      border-radius: var(--p-r-lg);
      box-shadow: var(--p-shadow-lg, 0 8px 24px rgba(0,0,0,0.10));
      max-width: 580px;
      width: calc(100% - 4rem);
      font-family: var(--p-font-body);
      overflow: hidden;
    }
    .editor-note-dialog::backdrop {
      background: rgba(11, 18, 32, 0.45);
      backdrop-filter: blur(2px);
    }
    .editor-note-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--p-border-soft);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      text-align: center;
      background: var(--p-tint);
    }
    .editor-note-header .masthead {
      font-family: var(--p-font-display);
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.015em;
      color: var(--p-fg);
      line-height: 1.1;
    }
    .editor-note-header .dateline {
      font-family: var(--p-font-mono);
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--p-fg-soft);
    }
    .editor-note-header .rule-set {
      padding: 0.4rem 0.85rem;
      font-family: var(--p-font-body);
      font-size: 0.84rem;
      color: var(--p-fg-muted);
      background: var(--p-bg);
      border-radius: 999px;
      border: 1px solid var(--p-border-soft);
      max-width: 320px;
    }
    .editor-note-dialog textarea {
      width: 100%;
      min-height: 220px;
      box-sizing: border-box;
      border: none;
      background: transparent;
      font-family: var(--p-font-body);
      font-size: 1rem;
      line-height: 1.55;
      padding: 1.2rem 1.5rem;
      resize: vertical;
      color: var(--p-fg);
      outline: none;
    }
    .editor-note-dialog textarea::placeholder {
      color: var(--p-fg-soft);
      opacity: 1;
    }
    .editor-note-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 1.5rem 1rem;
      border-top: 1px solid var(--p-border-soft);
      background: var(--p-surface);
      gap: 1rem;
    }
    .editor-note-footer .meta {
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
      font-family: var(--p-font-mono);
      font-size: 0.72rem;
      color: var(--p-fg-soft);
      letter-spacing: 0.02em;
    }
    .editor-note-footer .meta .gate {
      font-family: var(--p-font-body);
      letter-spacing: 0;
      color: var(--p-fg-muted);
      font-size: 0.78rem;
    }
    .editor-note-footer .actions {
      display: flex;
      gap: 0.5rem;
    }
    .editor-note-footer button {
      font-family: var(--p-font-body);
      font-weight: 500;
      font-size: 0.88rem;
      background: var(--p-bg);
      border: 1px solid var(--p-border);
      padding: 0.5rem 1rem;
      color: var(--p-fg);
      cursor: pointer;
      letter-spacing: 0;
      border-radius: var(--p-r-sm);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .editor-note-footer button:hover {
      background: var(--p-tint);
      border-color: var(--p-accent);
      color: var(--p-accent);
    }
    .editor-note-footer .send-btn {
      background: var(--p-accent);
      color: #fff;
      border-color: var(--p-accent);
    }
    .editor-note-footer .send-btn:hover {
      background: var(--p-accent-deep);
      border-color: var(--p-accent-deep);
      color: #fff;
    }
    .editor-note-footer .send-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .editor-note-footer .send-btn .stamp { margin-right: 0.35rem; }

    .editor-note-toast {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 110;
      background: var(--p-fg);
      color: var(--p-bg);
      padding: 0.9rem 1.1rem;
      font-family: var(--p-font-body);
      font-size: 0.94rem;
      line-height: 1.4;
      border-left: 4px solid var(--p-accent);
      border-radius: var(--p-r-sm);
      max-width: 360px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.20);
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .editor-note-toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .editor-note-toast strong {
      font-family: var(--p-font-display);
      font-weight: 600;
      display: block;
      margin-bottom: 0.2rem;
      letter-spacing: -0.005em;
    }
    .editor-note-toast .stamp-name {
      font-family: var(--p-font-mono);
      color: var(--p-accent-soft);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      display: block;
    }

    @media (max-width: 600px) {
      .editor-note-btn {
        top: 0.6rem;
        right: 0.6rem;
        padding: 0.45rem 0.7rem;
        font-size: 0.72rem;
      }
      .editor-note-btn .note-label small { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Пульс <small id="version">— загружается…</small>
        <a class="nav-link" href="/dashboard">→ дашборд CEO</a></h1>
    <div id="thread"></div>
  </main>

  <!-- Заметка редактору: floating button + modal letter-form (v1.6.0).
       Submits to POST /api/feedback/general which the next evolution
       cycle will pass through evaluate_general_alignment(). -->
  <button id="editor-note-btn" class="editor-note-btn" type="button"
          aria-label="Открыть заметку редактору">
    <span class="seal">✦</span>
    <span class="note-label">заметка<small>редактору</small></span>
  </button>

  <dialog id="editor-note-dialog" class="editor-note-dialog">
    <form method="dialog">
      <header class="editor-note-header">
        <span class="dateline">от читателя</span>
        <span class="masthead">Редакции Пульса</span>
        <span class="rule-set">общие пожелания, замечания, наблюдения</span>
      </header>
      <textarea id="editor-note-text"
                placeholder="Что Пульсу стоит делать иначе? Какой паттерн вы заметили? Что важно для вас, но он этого ещё не понимает? Пишите свободно — это не про конкретный ответ, это про общее направление. Перед попаданием в эволюционный шаг текст пройдёт сверку с конституцией, системным промптом, бэклогом и памятью Пульса."
                maxlength="4000"></textarea>
      <footer class="editor-note-footer">
        <span class="meta">
          <span><span id="char-count">0</span>/4000</span>
          <span class="gate">проверяется на соответствие BIBLE.md</span>
        </span>
        <div class="actions">
          <button type="button" id="editor-note-cancel">отозвать</button>
          <button type="button" id="editor-note-send" class="send-btn">
            <span class="stamp">✉</span>отправить в эволюцию
          </button>
        </div>
      </footer>
    </form>
  </dialog>
  <div id="editor-note-toast" class="editor-note-toast" role="status" aria-live="polite"></div>
  <form id="composer">
    <div class="row">
      <textarea id="q" placeholder="Спроси что-нибудь про сотрудника… (Ctrl+Enter — отправить)"
                rows="1"></textarea>
      <button type="submit" class="primary" id="send">→</button>
    </div>
  </form>
  <div id="toast" class="toast"></div>

<!--
  Markdown renderer (marked) + sanitizer (DOMPurify) for assistant bubbles.
  Production strategy: vendored copies in web/vendor/ are loaded first (the
  bank VM has no outbound internet). If those files are missing, we
  optionally try a CDN. If nothing loads, renderAssistantMarkdown() falls
  back to escaped plain text — the chat keeps working, it just shows raw
  Markdown like before this release. Closes fb-class-003.
-->
<script src="/static/vendor/marked.min.js"></script>
<script src="/static/vendor/purify.min.js"></script>
<script>
(function () {
  function loadCdn(src) {
    return new Promise(function (resolve) {
      var s = document.createElement('script');
      s.src = src; s.crossOrigin = 'anonymous';
      s.onload = function () { resolve(true); };
      s.onerror = function () { resolve(false); };
      document.head.appendChild(s);
    });
  }
  // CDN is optional (dev workstations). On the bank VM the requests will
  // fail and we silently fall back to plain text — that's the contract.
  window.__pulseMdReady = (async function () {
    try {
      if (typeof window.marked === 'undefined') {
        await loadCdn('https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js');
      }
      if (typeof window.DOMPurify === 'undefined') {
        await loadCdn('https://cdn.jsdelivr.net/npm/dompurify@3.1.4/dist/purify.min.js');
      }
    } catch (_) { /* offline: plain-text fallback */ }
  })();
})();
</script>

<script>
const thread = document.getElementById('thread');
const q = document.getElementById('q');
const send = document.getElementById('send');
const composer = document.getElementById('composer');
const toast = document.getElementById('toast');

// Per-tab session memory: prior turns we send back so the SDK can
// keep multi-turn context across separate /api/chat/stream calls.
// Hydrated from /api/history on page load; appended on each `done`.
const session = { history: [] };
const HISTORY_SEND_LIMIT = 10;

function showToast(text) {
  toast.textContent = text;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1800);
}

function appendUser(text) {
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  thread.appendChild(d);
  d.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function appendPulse(text, msgId) {
  const wrap = document.createElement('div');
  const body = document.createElement('div');
  body.className = 'msg pulse';
  body.textContent = text;
  wrap.appendChild(body);

  const meta = document.createElement('div');
  meta.className = 'meta';
  const upBtn = document.createElement('button'); upBtn.textContent = '👍';
  const downBtn = document.createElement('button'); downBtn.textContent = '👎';
  const commentInput = document.createElement('input');
  commentInput.type = 'text'; commentInput.placeholder = 'комментарий (опц.)';
  meta.append(upBtn, downBtn, commentInput);
  meta.append(Object.assign(document.createElement('span'),
                             { textContent: msgId, style: 'font-family:monospace; font-size:0.75rem' }));
  wrap.appendChild(meta);
  thread.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });

  upBtn.addEventListener('click', () => sendFeedback(msgId, 'up', commentInput.value, upBtn, downBtn));
  downBtn.addEventListener('click', () => sendFeedback(msgId, 'down', commentInput.value, downBtn, upBtn));
}

async function sendFeedback(msgId, verdict, comment, btnActive, btnOther) {
  try {
    const r = await fetch('/api/feedback', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message_id: msgId, verdict, comment }),
    });
    if (!r.ok) throw new Error(await r.text());
    btnActive.classList.add('active');
    btnOther.classList.remove('active');
    showToast(verdict === 'up' ? 'Учтено как лайк' : 'Учтено как дизлайк');
  } catch (e) {
    showToast('Ошибка: ' + e.message);
  }
}

// --- Streaming chat plumbing ------------------------------------------------

const TOOL_LABELS = {
  'mcp__pulse-tools__get_employee_profile':  'профиль сотрудника',
  'mcp__pulse-tools__get_employee_metrics':  'метрики сотрудника',
  'mcp__pulse-tools__list_employees':        'список сотрудников',
  'mcp__pulse-tools__get_collab_neighbors':  'связи с коллегами',
  'mcp__pulse-tools__query_jira':            'JIRA',
  'mcp__pulse-tools__query_confluence':      'Confluence',
  'mcp__pulse-tools__predict_attrition':     'прогноз оттока',
  'mcp__pulse-tools__recommend_courses':     'рекомендация курсов',
  'mcp__pulse-tools__predict_role_success':  'прогноз успешности',
  'mcp__pulse-tools__update_scratchpad':     'правка scratchpad',
  'mcp__pulse-tools__update_identity':       'правка identity',
  'mcp__pulse-tools__knowledge_read':        'чтение knowledge',
  'mcp__pulse-tools__knowledge_write':       'запись в knowledge',
  'mcp__pulse-tools__knowledge_list':        'список knowledge',
};

function humanizeTool(name) {
  if (TOOL_LABELS[name]) return TOOL_LABELS[name];
  // strip the SDK MCP prefix and snake_case → spaces
  return String(name).replace(/^mcp__[^_]+__/, '').replace(/_/g, ' ');
}

function summarizeArgs(args) {
  if (args == null) return '';
  if (typeof args !== 'object') return String(args);
  if (args._truncated) return args._truncated;
  if (args._repr) return args._repr;
  const eid = args.emp_id || args.employee_id || args.id;
  if (eid) return String(eid);
  const k = Object.keys(args)[0];
  if (k && typeof args[k] !== 'object') return `${k}=${String(args[k]).slice(0, 30)}`;
  return '';
}

function makeActivity() {
  const wrap = document.createElement('div');
  wrap.className = 'activity';
  return wrap;
}

function addStep(activity, icon, label, arg) {
  const row = document.createElement('div');
  row.className = 'step';
  row.append(Object.assign(document.createElement('span'), { textContent: icon }));
  row.append(Object.assign(document.createElement('span'), { textContent: label }));
  if (arg) {
    row.append(Object.assign(document.createElement('span'),
                              { className: 'arg', textContent: arg }));
  }
  activity.appendChild(row);
  return row;
}

function attachFeedback(wrap, msgId) {
  const meta = document.createElement('div');
  meta.className = 'meta';
  const upBtn = document.createElement('button'); upBtn.textContent = '👍';
  const downBtn = document.createElement('button'); downBtn.textContent = '👎';
  const commentInput = document.createElement('input');
  commentInput.type = 'text'; commentInput.placeholder = 'комментарий (опц.)';
  meta.append(upBtn, downBtn, commentInput);
  meta.append(Object.assign(document.createElement('span'),
                             { textContent: msgId,
                               style: 'font-family:monospace; font-size:0.75rem' }));
  wrap.appendChild(meta);
  upBtn.addEventListener('click', () => sendFeedback(msgId, 'up', commentInput.value, upBtn, downBtn));
  downBtn.addEventListener('click', () => sendFeedback(msgId, 'down', commentInput.value, downBtn, upBtn));
}

async function ask(question) {
  send.disabled = true;
  appendUser(question);
  q.value = '';

  // Placeholder bubble: live activity log replaces "думаю…" as events arrive,
  // then the bubble's body is swapped for the final answer on `done`.
  const wrap = document.createElement('div');
  const body = document.createElement('div');
  body.className = 'msg pulse';
  const activity = makeActivity();
  const thinking = addStep(activity, '🧠', 'думаю');
  thinking.classList.add('pulsing');
  body.appendChild(activity);
  wrap.appendChild(body);
  thread.appendChild(wrap);
  wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });

  // Snapshot the activity steps for the post-answer trace details panel.
  const traceSteps = [];

  try {
    const r = await fetch('/api/chat/stream', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        history: session.history.slice(-HISTORY_SEND_LIMIT),
      }),
    });
    if (!r.ok) throw new Error(await r.text());

    const reader = r.body.getReader();
    const decoder = new TextDecoder('utf-8');
    let buf = '';
    let finalEv = null;

    const handleEvent = (ev) => {
      if (ev.type === 'tool_call') {
        const label = humanizeTool(ev.name);
        const arg = summarizeArgs(ev.args);
        addStep(activity, '🔧', label, arg);
        traceSteps.push({ icon: '🔧', label, arg });
      } else if (ev.type === 'text' && ev.text && ev.text.trim()) {
        const snippet = ev.text.trim().slice(0, 60);
        addStep(activity, '💭', snippet + (ev.text.length > 60 ? '…' : ''));
        traceSteps.push({ icon: '💭', label: snippet });
      } else if (ev.type === 'status' && ev.phase === 'starting') {
        thinking.firstChild.nextSibling.textContent =
          `думаю · ${(ev.model || '').replace(/^claude-/, '')}`;
      } else if (ev.type === 'error') {
        addStep(activity, '⚠️', 'ошибка', ev.message);
        traceSteps.push({ icon: '⚠️', label: 'ошибка', arg: ev.message });
      } else if (ev.type === 'done') {
        finalEv = ev;
      }
      wrap.scrollIntoView({ behavior: 'smooth', block: 'end' });
    };

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      // SSE frames are separated by a blank line. Process all complete frames.
      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const frame = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        for (const line of frame.split('\n')) {
          if (!line.startsWith('data:')) continue;
          const payload = line.slice(5).trimStart();
          if (!payload) continue;
          try { handleEvent(JSON.parse(payload)); }
          catch (err) { console.warn('bad SSE payload', payload, err); }
        }
      }
    }

    if (!finalEv) throw new Error('Стрим закрылся без финального события.');

    // Remember this turn for the next SDK call's context replay.
    session.history.push({ question, answer: finalEv.answer || '' });

    // Replace the activity log with the final answer; keep the trace under <details>.
    body.textContent = finalEv.answer || '(пустой ответ)';
    if (traceSteps.length) {
      const det = document.createElement('details');
      det.className = 'trace';
      const sum = document.createElement('summary');
      sum.textContent = `шаги (${traceSteps.length})`;
      const inner = makeActivity();
      for (const s of traceSteps) addStep(inner, s.icon, s.label, s.arg);
      det.append(sum, inner);
      wrap.appendChild(det);
    }
    attachFeedback(wrap, finalEv.message_id);
  } catch (e) {
    body.textContent = 'Ошибка: ' + e.message;
  } finally {
    send.disabled = false;
    q.focus();
  }
}

composer.addEventListener('submit', (ev) => {
  ev.preventDefault();
  const text = q.value.trim();
  if (text) ask(text);
});
q.addEventListener('keydown', (ev) => {
  if (ev.ctrlKey && ev.key === 'Enter') {
    ev.preventDefault();
    composer.requestSubmit();
  }
});

(async () => {
  try {
    const r = await fetch('/health');
    const data = await r.json();
    document.getElementById('version').textContent = '— v' + data.version
      + (data.oauth_token_present ? '' : ' · ⚠ нет OAuth токена');
  } catch (e) { /* ignore */ }
  try {
    const r = await fetch('/api/history?limit=10');
    const { items } = await r.json();
    for (const it of items) {
      appendUser(it.question);
      appendPulse(it.answer || '(пусто)', it.message_id);
      // Hydrate the session-history buffer so the next chat call carries
      // these prior turns back to the SDK.
      session.history.push({ question: it.question, answer: it.answer || '' });
    }
  } catch (e) { /* ignore */ }

  // Drill-down from /dashboard: pre-fill the input and focus it.
  // The dashboard's actionable elements link to `/?q=<urlencoded>`; we
  // pull the value here, set the textarea, and let the user press Enter.
  // We do not auto-submit — CEO may want to tweak phrasing first.
  try {
    const params = new URLSearchParams(window.location.search);
    const prefill = params.get('q');
    if (prefill) {
      q.value = prefill;
      q.focus();
      // Move cursor to end so it feels like they just typed it.
      const len = q.value.length;
      q.setSelectionRange(len, len);
      // Clean the URL so a refresh doesn't re-prefill.
      const clean = window.location.pathname + window.location.hash;
      window.history.replaceState({}, '', clean);
    }
  } catch (e) { /* ignore */ }
})();
</script>

<script>
// === Заметка редактору ====================================================
// Editor-note widget plumbing. Independent IIFE so a parse error here
// can't break the chat above.
(function () {
  const btn = document.getElementById('editor-note-btn');
  const dialog = document.getElementById('editor-note-dialog');
  const textarea = document.getElementById('editor-note-text');
  const charCount = document.getElementById('char-count');
  const sendBtn = document.getElementById('editor-note-send');
  const cancelBtn = document.getElementById('editor-note-cancel');
  const toast = document.getElementById('editor-note-toast');
  if (!btn || !dialog || !textarea) return;

  function openDialog() {
    if (typeof dialog.showModal === 'function') {
      dialog.showModal();
    } else {
      dialog.setAttribute('open', 'open');
    }
    setTimeout(function () { textarea.focus(); }, 60);
  }

  function closeDialog() {
    if (typeof dialog.close === 'function') {
      try { dialog.close(); } catch (_) {}
    }
    dialog.removeAttribute('open');
  }

  function showToast(headline, body) {
    if (!toast) return;
    toast.innerHTML = '<strong></strong><span class="stamp-name"></span>';
    toast.querySelector('strong').textContent = headline;
    toast.querySelector('.stamp-name').textContent = body || '';
    toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function () { toast.classList.remove('show'); }, 4800);
  }

  btn.addEventListener('click', openDialog);
  cancelBtn.addEventListener('click', function () {
    closeDialog();
  });

  textarea.addEventListener('input', function () {
    if (charCount) charCount.textContent = String(textarea.value.length);
  });

  // Ctrl/Cmd+Enter sends.
  textarea.addEventListener('keydown', function (ev) {
    if ((ev.ctrlKey || ev.metaKey) && ev.key === 'Enter') {
      ev.preventDefault();
      sendBtn.click();
    }
  });

  sendBtn.addEventListener('click', async function () {
    const text = textarea.value.trim();
    if (text.length < 4) {
      showToast('Слишком коротко', 'минимум 4 символа');
      return;
    }
    sendBtn.disabled = true;
    const orig = sendBtn.innerHTML;
    sendBtn.innerHTML = '<span class="stamp">✦</span>отправляю…';
    try {
      const r = await fetch('/api/feedback/general', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text }),
      });
      if (!r.ok) {
        const errTxt = await r.text();
        throw new Error(errTxt || ('HTTP ' + r.status));
      }
      const data = await r.json();
      showToast('Принято в редакцию',
                'id ' + data.id + ' · попадёт в ближайший цикл эволюции');
      textarea.value = '';
      if (charCount) charCount.textContent = '0';
      closeDialog();
    } catch (e) {
      showToast('Не доставлено', (e && e.message) ? e.message.slice(0, 120) : 'неизвестная ошибка');
    } finally {
      sendBtn.disabled = false;
      sendBtn.innerHTML = orig;
    }
  });
})();
</script>
